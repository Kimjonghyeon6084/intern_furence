<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <title>유저 리스트</title>
    <style>
        body, html {
            width : 100%;
            height : 100%;
            margin : 0;
            background-color : aliceblue;
        }
        h2 {
            text-align: center;
            font-size : 30px;
        }
        table, tr, th, td {
            margin : auto;
            border : 1px solid #444444;
            border-collapse : collapse;
            padding : 10px 5px;
            text-align : center;
        }
        thead {
            background-color : #BDBDBD;
        }
        #pagination {
            text-align: center;
        }
        button {
            background: #abb7b7;
              border: 2px solid #abb7b7;
              font-weight: bold;
              padding: 10px 40px;
              margin: 30px 5px 30px 5px;
              display: inline-block;
              font-family: segoe UI;
              font-size: 14px;
              outline: none;
              color: #fff;
              font-weight: bold;
              border-radius : 20px;
        }
        #userTable {
            width : 70%;
            margin-top : 60px;
        }

    </style>
</head>
<body>
    <h2>유저 리스트</h2>
    <table id="userTable">
        <thead>
        <tr>
            <th>ID</th>
            <th>이름</th>
            <th>Level</th>
            <th>Desc</th>
            <th>Reg Date</th>
        </tr>
        </thead>
        <tbody>
        </tbody>
    </table>
    <div id="pagination"></div>

    <script>
        let currentPage = 0;
        const size = 10;

        function getPageFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return parseInt(params.get('page')) || 0;
        }

        function getSizeFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return parseInt(params.get('size')) || size;
        }

        // 페이지 이동(버튼 클릭 시)
        function movePage(page) {
            currentPage = page;
            const url = new URL(window.location.origin + `/userlist/${page}`);
                window.history.pushState({}, '', url);
                fetchUserList(page);
        }

        // 뒤로가기/앞으로가기
        window.addEventListener('popstate', () => {
            const page = getPageFromUrl();
            currentPage = page;
            fetchUserList(page);
        });

        // 유저 리스트 불러오기
        function fetchUserList(page = 0) {
            fetch(`/user/list/${page}`)
                .then(async res => {
                    if (!res.ok) {
                        let msg;
                        try {
                            const data = await res.json();
                            msg = data.message || JSON.stringify(data);
                        } catch {
                            msg = await res.text();
                        }
                        alert(msg);
                        if (res.status === 401) {
                            window.location.href = "/login";
                        }
                        throw new Error(msg);
                    }
                    return res.json();
                })
                .then(data => {
                    if (!data) return;
                    renderTable(data.content);
                    renderPagination(data.number, data.totalPages, data.last);
                })
                .catch(err => {
                    if (err.message !== '로그인 필요') {
                        alert('유저 데이터를 불러오는데 실패했습니다.');
                        console.error(err);
                    }
                });
        }

        function renderTable(users) {
            const tbody = document.querySelector("#userTable tbody");
            tbody.innerHTML = "";
            if (!users || users.length === 0) {
                const row = `<tr><td colspan="5">데이터가 없습니다.</td></tr>`;
                tbody.insertAdjacentHTML('beforeend', row);
                return;
            }
            users.forEach(user => {
                const regDate = user.reg_date
                    ? new Date(user.reg_date).toLocaleString('ko-KR', { hour12: false })
                    : '';
                const row = `
                    <tr>
                        <td>${user.id}</td>
                        <td>${user.name}</td>
                        <td>${user.level}</td>
                        <td>${user.desc || ''}</td>
                        <td>${regDate}</td>
                    </tr>
                `;
                tbody.insertAdjacentHTML('beforeend', row);
            });
        }

        function renderPagination(current, totalPages, isLast) {
            const pageDiv = document.getElementById("pagination");
            pageDiv.innerHTML = "";

            const pageSize = 10;
            const currentGroup = Math.floor(current / pageSize);
            const startPage = currentGroup * pageSize;
            let endPage = startPage + pageSize - 1;
            if (endPage >= totalPages) endPage = totalPages - 1;

            if (startPage > 0) {
                pageDiv.innerHTML += `<button onclick="movePage(${startPage - 1})">이전</button>`;
            }

            for (let i = startPage; i <= endPage; i++) {
                pageDiv.innerHTML += `
                    <button onclick="movePage(${i})" ${i === current ? 'style="font-weight:bold;background:#BDBDBD;"' : ''}>
                        ${i + 1}
                    </button>
                `;
            }

            if (!isLast && endPage < totalPages - 1) {
                pageDiv.innerHTML += `<button onclick="movePage(${endPage + 1})">다음</button>`;
            }
        }

        function goToUploadPage() {
            window.location.href = "/upload";
        }

        /* 페이지 로딩될 때 /user/list/{page} 로 get요청 메서드 */
        window.addEventListener('DOMContentLoaded', () => {
            const pathParts = window.location.pathname.split('/');
            let page = 0;
            if (pathParts.length >= 3 && pathParts[1] === 'userlist') {
                page = parseInt(pathParts[2]) || 0;
            }
            currentPage = page;
            fetchUserList(currentPage);
        });
    </script>


</body>
</html>
