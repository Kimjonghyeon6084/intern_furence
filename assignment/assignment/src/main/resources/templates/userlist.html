<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <title>유저 리스트</title>
    <style>
        h2 {
            text-align: center;
        }
        table, tr, th, td {
            margin : auto;
            border : 1px solid #444444;
            border-collapse : collapse;
            padding : 10px 5px;
            text-align : center;
        }
        thead {
            background-color : #BDBDBD;
        }
        #pagination {
            text-align: center;
        }
    </style>
</head>
<body>
    <h2>유저 리스트</h2>
    <table id="userTable">
        <thead>
        <tr>
            <th>ID</th>
            <th>이름</th>
            <th>Level</th>
            <th>Desc</th>
            <th>Reg Date</th>
        </tr>
        </thead>
        <tbody>
        </tbody>
    </table>
    <div id="pagination"></div>
    <hr>
    <button onclick="goToUploadPage()">파일 업로드</button>
    <script>
        // 유저 리스트 불러오기
        let currentPage = 0;
        const size = 10;

        function fetchUserList(page = 0) {
        fetch(`/user/list?page=${page}&size=${size}`)
            .then(res => {
                if (res.status === 401) {
                    // 401(로그인 안함)이면 로그인 페이지로 이동
                    alert('로그인이 필요합니다.');
                    window.location.href = "/login"; // 실제 로그인 경로로 수정!
                    return Promise.reject('로그인 필요'); // 이후 코드 중단
                }
                return res.json();
            })
            .then(data => {
                if (!data) return; // 위에서 로그인 아니면 중단
                renderTable(data.content);
                renderPagination(data.number, data.totalPages, data.last);
            })
            .catch(err => {
                if (err !== '로그인 필요') {
                    alert('유저 데이터를 불러오는데 실패했습니다.');
                    console.error(err);
                }
            });
        }

        function renderTable(users) {
            const tbody = document.querySelector("#userTable tbody");
            tbody.innerHTML = ""; // 초기화
            if (users.length === 0) {
                const row = `<tr><td colspan="5">데이터가 없습니다.</td></tr>`;
                tbody.insertAdjacentHTML('beforeend', row);
                return;
            }
            users.forEach(user => {
                const regDate = user.reg_date
                    ? new Date(user.reg_date).toLocaleString('ko-KR', { hour12: false })
                    : '';
                const row = `
                    <tr>
                        <td>${user.id}</td>
                        <td>${user.name}</td>
                        <td>${user.level}</td>
                        <td>${user.desc || ''}</td>
                        <td>${regDate}</td>
                    </tr>
                `;
                tbody.insertAdjacentHTML('beforeend', row);
            });
        }

        function renderPagination(current, totalPages, isLast) {
            const pageDiv = document.getElementById("pagination");
            pageDiv.innerHTML = "";

            const pageSize = 10;
            const currentGroup = Math.floor(current / pageSize);
            const startPage = currentGroup * pageSize;
            let endPage = startPage + pageSize - 1;
            if (endPage >= totalPages) endPage = totalPages - 1;

            if (startPage > 0) {
                pageDiv.innerHTML += `<button onclick="movePage(${startPage - 1})">이전</button>`;
            }

            for (let i = startPage; i <= endPage; i++) {
                pageDiv.innerHTML += `
                    <button onclick="movePage(${i})" ${i === current ? 'style="font-weight:bold;background:#BDBDBD;"' : ''}>
                        ${i + 1}
                    </button>
                `;
            }

            if (!isLast && endPage < totalPages - 1) {
                pageDiv.innerHTML += `<button onclick="movePage(${endPage + 1})">다음</button>`;
            }
        }

        function movePage(page) {
            currentPage = page;
            fetchUserList(page);
        }

        function goToUploadPage() {
            window.location.href = "/upload";
        }

        // 첫 로딩에 리스트 호출
        fetchUserList(currentPage);
    </script>
</body>
</html>
